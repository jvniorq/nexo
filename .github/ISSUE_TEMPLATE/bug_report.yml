name: Bug report
description: Report unexpected behavior in Nexo
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve Nexo. Do not include passwords, tokens, private household information, or security vulnerabilities in this form.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
      placeholder: A clear and concise description.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Windows
        - macOS
        - Web
        - Not applicable / planning
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable sequence of steps.
      placeholder: |
        1. Open...
        2. Select...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots or accessibility details after removing personal information.
