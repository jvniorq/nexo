name: Complete task module

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: complete-task-module
  cancel-in-progress: false

jobs:
  implement-and-verify:
    name: Implement and verify task experience
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Write task module files
        env:
          MAIN_B64_A: 
          MAIN_B64_B: 
          MODELS_B64: 
          TESTS_B64: 
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path("lib/main.dart").write_bytes(
              base64.b64decode(os.environ["MAIN_B64_A"] + os.environ["MAIN_B64_B"])
          )
          Path("lib/domain/models.dart").write_bytes(
              base64.b64decode(os.environ["MODELS_B64"])
          )
          Path("test/widget_test.dart").write_bytes(
              base64.b64decode(os.environ["TESTS_B64"])
          )
          PY

      - name: Format Dart sources
        run: dart format lib test

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter code
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

      - name: Commit verified task module
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/complete-task-module.yml
          git add lib/main.dart lib/domain/models.dart test/widget_test.dart
          git commit -m "Add task priorities, deadlines, and subtasks"
          git push origin main
